# Place this file at: .github/workflows/snake.yml
# in your `jlcl11/jlcl11` profile repository.
#
# It runs every 12 hours (and on demand) and generates two SVGs in the `output` branch:
#   - github-contribution-grid-snake.svg        (light mode)
#   - github-contribution-grid-snake-dark.svg   (dark mode, iOS-themed)
#
# The README references those SVGs from the `output` branch — no extra commit needed.

name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:           # allow manual run from Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate Snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jlcl11
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#FA7343&color_dots=#1C1C1E,#0D96F6,#34C759,#FF9F0A,#FA7343

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
